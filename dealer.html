<!DOCTYPE html>

<head>

<title>Dealer Registration | Maliha Agro Industry</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

<div class="container">

<div class="card">

<h1>🤝 Dealer Registration</h1>

<p class="tagline">
মালিহা এগ্রো ইন্ডাস্ট্রির অনুমোদিত ডিলার হতে নিচের তথ্য পূরণ করুন।
</p>

<form action="https://formsubmit.co/malihaindustry@gmail.com" method="POST">

<input type="hidden" name="_captcha" value="false">

<input type="hidden" name="_next" value="https://malihaagroindustry.github.io/contact/thankyou.html">

<input type="hidden" name="_subject" value="New Dealer Registration - Maliha Agro Industry">

<input type="text" name="name" placeholder="আপনার নাম" required>

<input type="tel" name="phone" placeholder="মোবাইল নাম্বার" required>

<input type="email" name="email" placeholder="ইমেইল (ঐচ্ছিক)">

<input type="text" name="district" placeholder="জেলা" required>

<input type="text" name="upazila" placeholder="উপজেলা" required>

<input type="text" name="business" placeholder="বর্তমান ব্যবসার নাম">

<textarea name="message" placeholder="আপনার সম্পর্কে কিছু লিখুন"></textarea>

<button type="submit" class="btn">
🚀 আবেদন জমা দিন
</button>

</form>

<a href="index.html" class="btn">
🏠 Back to Home
</a>

</div>

</div>
