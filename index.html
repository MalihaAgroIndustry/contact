<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Maliha Agro Industry | Digital Business Card</title>

    <link rel="stylesheet" href="style.css">

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

    
</head>

<body>

<div class="container">

    <div class="card">

        <div class="hero">

            <img src="logo.png" alt="MAI Logo" class="logo">

            <span class="badge">🌱 Trusted Organic Brand</span>

            <h1>Maliha Agro Industry</h1>

            <h2>মালিহা এগ্রো ইন্ডাস্ট্রি</h2>

            <h3>Md. Mainur Reza</h3>

            <p class="designation">
                Founder & Director
            </p>

            <p class="tagline">
                Manufacturer of Premium Organic Fertilizers<br>
                Vermicompost • Tricho Compost • Egg Shell Powder
            </p>

        </div>

        <div class="quick-info">

            <div class="info-box">
                📍
                <span>Chapainawabganj</span>
            </div>

            <div class="info-box">
                📞
                <span>01303-679189</span>
            </div>

            <div class="info-box">
                ✉️
                <span>Official</span>
            </div>

        </div>

        <div class="buttons">

            <!-- পরবর্তী পার্টে বাটনগুলো যোগ হবে -->

        </div>

    </div>

</div>
<script src="script.js"></script>

</body>
</html>
